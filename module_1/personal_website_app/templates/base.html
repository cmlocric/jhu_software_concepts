<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}My Personal Website{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
           .navbar .nav-link{
        color: black;
        font-weight: bold;
        }

        .navbar .nav-link.active {
        color: #0d6efd;
        }

        h1, h2, h3 {
            margin-bottom: 16px;
        }

        p {
            margin-bottom: 20px;
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <div class="container mt-4">
        <nav class="navbar navbar-expand-lg navbar-light bg-light px-3 mb-4">
            <div class="container-fluid px-0">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="mainNavbar">
                    <ul class="navbar-nav ms-auto">

                        <li class="nav-item">
                            <a class="nav-link {% if request.endpoint == 'pages.home' %}active{% endif %}" 
                            href="{{ url_for('pages.home') }}">About</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.endpoint == 'pages.publications' %}active{% endif %}"
                             href="{{ url_for('pages.publications') }}">Publications</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.endpoint == 'pages.contacts' %}active{% endif %}"
                            href="{{ url_for('pages.contacts') }}">Contact</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
