<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %} Grad School Cafe Data Analysis</title>
    <style>
        nav {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 10px 20px;
        }

        nav a.brand {
            color: #607d8b;
            font-size: 20px;
            text-decoration: none;
        }

        .nav-buttons {
            display: flex;
            gap: 20px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 180px;
            text-align: center;
        }

        .nav-item a,
        .nav-item button {
            background-color: #607d8b;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 16px;
            border: none;
            cursor: pointer;
        }

        .nav-item a:hover,
        .nav-item button:hover {
            background-color: #4b636e;
        }

        .nav-item button:disabled {
            background-color: #90a4ae;
            cursor: not-allowed;
        }

        .nav-help {
            margin-top: 6px;
            font-size: 12px;
            color: #555;
        }

        .question {
            padding: 20px;
            margin: 10px;
            background-color: #f7f4f4;
        }

        .review {
            margin-left: 50px;
            font-size: 20px;
        }

        #pull-data-status {
            margin: 10px 20px;
            color: #333;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <nav>
        <a class="brand" href="{{ url_for('index') }}">Grad School Cafe Data Analysis</a>

        <div class="nav-buttons">
            <div class="nav-item">
                <button id="pull-data-btn" type="button">Pull Data</button>
                <span class="nav-help">Import the latest applicant data into the applicants database.</span>
            </div>

            <div class="nav-item">
                <a href="{{ url_for('update_analysis') }}">Update Analysis</a>
                <span class="nav-help">Refresh the dashboard results using the latest database contents.</span>
            </div>
        </div>
    </nav>

    <hr>

    <div id="pull-data-status"></div>

    <div class="content">
        {% block content %}{% endblock %}
    </div>

<script>
    const pullDataBtn = document.getElementById("pull-data-btn");
    const pullDataStatus = document.getElementById("pull-data-status");

    if (pullDataBtn) {
        pullDataBtn.addEventListener("click", async () => {
            pullDataBtn.disabled = true;
            pullDataStatus.textContent = "Running Pull Data...";
            pullDataStatus.style.color = "#333";

            try {
                const response = await fetch("{{ url_for('pull_data') }}", {
                    method: "POST"
                });

                const data = await response.json();

                if (!response.ok || !data.ok) {
                    pullDataStatus.textContent = "Pull Data failed";
                    pullDataStatus.style.color = "red";
                    alert(data.error || "Unknown error");
                    pullDataBtn.disabled = false;
                    return;
                }

                pullDataStatus.textContent = "Pull Data completed successfully";
                pullDataStatus.style.color = "green";
                pullDataBtn.disabled = false;

                setTimeout(() => {
                    pullDataStatus.textContent = "";
                    pullDataStatus.style.color = "#333";
                }, 5000);

            } catch (error) {
                pullDataStatus.textContent = "Pull Data failed";
                pullDataStatus.style.color = "red";
                alert("Request failed: " + error);
                pullDataBtn.disabled = false;
            }
        });
    }
</script>
</body>
</html>
