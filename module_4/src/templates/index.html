{% extends 'base.html' %}

{% block content %}
  <h1>{% block title %} Analysis {% endblock %}</h1>
  {% for question, answer_lines in query_results %}
  <div class="question">
    <h3><strong>{{ question }}</strong></h3>
    {% for line in answer_lines %}
    <p><em>Answer: {{ line }}</em></p>
    {% endfor %}
  </div>
  {% endfor %}
{% endblock %}
