<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %} Grad School Cafe Data Analysis</title>
    <style>
        nav {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 10px 20px;
        }

        nav a.brand {
            color: #607d8b;
            font-size: 20px;
            text-decoration: none;
        }

        .nav-buttons {
            display: flex;
            gap: 20px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 180px;
            text-align: center;
        }
        
        .nav-item button:disabled {
        background-color: #90a4ae;
        cursor: not-allowed;
        }

        .nav-item a,
        .nav-item button {
            background-color: #607d8b;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 16px;
            border: none;
            cursor: pointer;
        }

        .nav-item a:hover,
        .nav-item button:hover {
            background-color: #4b636e;
        }

        .nav-item button:disabled {
            background-color: #90a4ae;
            cursor: not-allowed;
        }

        .nav-help {
            margin-top: 6px;
            font-size: 12px;
            color: #555;
        }

        .question {
            padding: 20px;
            margin: 10px;
            background-color: #f7f4f4;
        }

        .review {
            margin-left: 50px;
            font-size: 20px;
        }

        #pull-data-status {
            margin: 10px 20px;
            color: #333;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <nav>
        <a class="brand" href="{{ url_for('index') }}">Grad School Cafe Data Analysis</a>

        <div class="nav-buttons">
            <div class="nav-item">
                <button id="pull-data-btn" data-testid="pull-data-btn" type="button">Pull Data</button>
                <span class="nav-help">Import the latest applicant data into the applicants database.</span>
            </div>

            <div class="nav-item">
            <button id="update-analysis-btn" data-testid="update-analysis-btn" type="button">Update Analysis</button>
                <span class="nav-help">Refresh the dashboard results using the latest database contents.</span>
            </div>
        </div>
    </nav>

    <hr>

    <div id="pull-data-status"></div>

    <div class="content">
        {% block content %}{% endblock %}
    </div>

    <script>
        const pullDataBtn = document.getElementById("pull-data-btn");
        const updateAnalysisBtn = document.getElementById("update-analysis-btn");
        const pullDataStatus = document.getElementById("pull-data-status");

        let pullDataRunning = false;

        function setPullDataRunning(isRunning) {
            pullDataRunning = isRunning;

            if (pullDataBtn) {
                pullDataBtn.disabled = isRunning;
            }

            if (updateAnalysisBtn) {
                updateAnalysisBtn.disabled = isRunning;
            }
        }

        if (pullDataBtn) {
            pullDataBtn.addEventListener("click", async () => {
                if (pullDataRunning) {
                    return;
                }

                setPullDataRunning(true);
                pullDataStatus.textContent = "Running Pull Data...";
                pullDataStatus.style.color = "#333";

                try {
                    const response = await fetch("{{ url_for('pull_data') }}", {
                        method: "POST"
                    });

                    const data = await response.json();

                    if (!response.ok || !data.ok) {
                        pullDataStatus.textContent = "Pull Data failed";
                        pullDataStatus.style.color = "red";
                        alert(data.error || "Unknown error");
                        setPullDataRunning(false);
                        return;
                    }

                    pullDataStatus.textContent = data.message || "Pull Data completed successfully";
                    pullDataStatus.style.color = "green";

                    setTimeout(() => {
                        pullDataStatus.textContent = "";
                        pullDataStatus.style.color = "#333";
                        setPullDataRunning(false);
                    }, 5000);

                } catch (error) {
                    pullDataStatus.textContent = "Pull Data failed";
                    pullDataStatus.style.color = "red";
                    alert("Request failed: " + error);
                    setPullDataRunning(false);
                }
            });
        }

        if (updateAnalysisBtn) {
            updateAnalysisBtn.addEventListener("click", async () => {
                if (pullDataRunning) {
                    return;
                }

                updateAnalysisBtn.disabled = true;

                try {
                    const response = await fetch("{{ url_for('update_analysis') }}", {
                        method: "POST"
                    });

                    const data = await response.json();

                    if (!response.ok || !data.ok) {
                        alert(data.error || "Update Analysis failed");
                        updateAnalysisBtn.disabled = false;
                        return;
                    }

                    window.location.href = "/";
                } catch (error) {
                    alert("Request failed: " + error);
                    updateAnalysisBtn.disabled = false;
                }
            });
        }
    </script>
</body>
</html>
